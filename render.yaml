# Конфигурация деплоя на Render.
# Render прочитает этот файл и развернёт игру автоматически.
#
# Что здесь описано:
#   - один веб-сервис на Node (наш сервер раздаёт клиент + держит WebSocket);
#   - сборка: установить зависимости и собрать клиент;
#   - запуск: стартовать сервер (он сам найдёт client/dist);
#   - бесплатный тариф (free).
#
# Render сам задаёт переменную PORT — наш сервер её читает.

services:
  - type: web
    name: landinvader
    runtime: node
    plan: free
    # Устанавливаем зависимости и собираем клиент.
    buildCommand: npm install && npm run build
    # Запускаем сервер (раздаёт статику клиента и WebSocket на одном порту).
    startCommand: npm run start
    # Проверка здоровья: Render пингует корень, чтобы понять, что сервер жив.
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: "20"
